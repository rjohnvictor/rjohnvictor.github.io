name: Generate GitHub README

on:
    push:
        branches: [main]
        paths:
            - messages/en.json
            - src/data/portfolio/**
            - scripts/generate-github-readme.mjs
            - templates/github-readme.template.md
    pull_request:
        paths:
            - messages/en.json
            - src/data/portfolio/**
            - scripts/generate-github-readme.mjs
            - templates/github-readme.template.md
    workflow_dispatch:

permissions:
    contents: write

jobs:
    generate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Generate README
              run: npm run generate:github-readme

            - name: Commit generated README
              if: github.event_name == 'push'
              run: |
                  if git diff --quiet -- GITHUB_README.md; then
                    echo "No changes to commit"
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add GITHUB_README.md
                  git commit -m "chore: sync generated GitHub README"
                  git push

            - name: Verify no drift on PR
              if: github.event_name == 'pull_request'
              run: git diff --exit-code -- GITHUB_README.md
