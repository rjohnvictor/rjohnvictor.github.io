name: Generate GitHub README (PR Mode)

on:
    push:
        branches: [main]
        paths:
            - messages/en.json
            - src/data/portfolio/**
            - scripts/generate-github-readme.mjs
            - templates/github-readme.template.md
            - .github/workflows/generate-github-readme.yml
    pull_request:
        paths:
            - messages/en.json
            - src/data/portfolio/**
            - scripts/generate-github-readme.mjs
            - templates/github-readme.template.md
            - .github/workflows/generate-github-readme.yml
    workflow_dispatch:

concurrency:
    group: generate-github-readme-main
    cancel-in-progress: false

permissions:
    contents: write
    pull-requests: write

jobs:
    generate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Generate README
              run: npm run generate:github-readme

            - name: Create or update PR for generated README
              if: github.event_name == 'push'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if git diff --quiet -- GITHUB_README.md; then
                    echo "No generated README changes"
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  BRANCH="chore/sync-generated-github-readme"
                  TITLE="chore: sync generated GitHub README"
                  BODY="Automated update of GITHUB_README.md from source content."

                  git checkout -B "$BRANCH"
                  git add GITHUB_README.md
                  git diff --cached --quiet && echo "No staged changes" && exit 0
                  git commit -m "$TITLE"
                  git push -u origin "$BRANCH"

                  PR_NUMBER=$(gh pr list \
                    --repo rjohnvictor/rjohnvictor.github.io \
                    --head "$BRANCH" \
                    --base main \
                    --json number \
                    --jq '.[0].number')

                  if [ -n "$PR_NUMBER" ]; then
                    gh pr edit "$PR_NUMBER" \
                      --repo rjohnvictor/rjohnvictor.github.io \
                      --title "$TITLE" \
                      --body "$BODY"
                  else
                    gh pr create \
                      --repo rjohnvictor/rjohnvictor.github.io \
                      --base main \
                      --head "$BRANCH" \
                      --title "$TITLE" \
                      --body "$BODY"
                  fi

            - name: Verify no drift on PR
              if: github.event_name == 'pull_request'
              run: git diff --exit-code -- GITHUB_README.md
