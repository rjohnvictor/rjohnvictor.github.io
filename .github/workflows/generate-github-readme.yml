name: Generate GitHub README (Human in the Loop)

on:
    push:
        branches: [main]
        paths:
            - messages/en.json
            - src/data/portfolio/**
            - scripts/generate-github-readme.mjs
            - templates/github-readme.template.md
            - .github/workflows/generate-github-readme.yml
    pull_request:
        paths:
            - messages/en.json
            - src/data/portfolio/**
            - scripts/generate-github-readme.mjs
            - templates/github-readme.template.md
            - .github/workflows/generate-github-readme.yml
    workflow_dispatch:

permissions:
    contents: read

jobs:
    generate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Generate README
              run: npm run generate:github-readme

            - name: Upload generated README
              uses: actions/upload-artifact@v4
              with:
                  name: generated-github-readme
                  path: GITHUB_README.md

            - name: Add human review instructions
              run: |
                  {
                    echo "### Human review required"
                    echo ""
                    echo "The workflow generated GITHUB_README.md and uploaded it as an artifact."
                    echo "Review the artifact, then commit and push the file manually if the change looks correct."
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Verify no drift on PR
              if: github.event_name == 'pull_request'
              run: git diff --exit-code -- GITHUB_README.md
